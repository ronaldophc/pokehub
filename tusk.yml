tasks:

  up:
    usage: Inicia os containers
    run: docker compose up -d

  down:
    usage: Para os containers
    run: docker compose down -t 0

  restart:
    usage: Reinicia os containers
    run: docker compose restart -t 0

  build:
    usage: Reconstrói e inicia os containers
    run: docker compose up -d --build

  start:
    usage: Startar containers
    run: docker compose start

  logs:
    usage: Exibe os logs de um serviço (app, nginx, reverb, queue, vite, db)
    args:
      service:
        usage: Nome do serviço (app, nginx, reverb, queue, vite, db)
    run: docker compose logs -f ${service}

  migrate:
    usage: Roda as migrations
    run: docker compose exec app php artisan migrate

  fresh:
    usage: Reseta o banco e roda todas as migrations
    run: docker compose exec app php artisan migrate:fresh

  tinker:
    usage: Abre o tinker
    run: docker compose exec app php artisan tinker

  artisan:
    usage: Roda um comando artisan (ex. tusk artisan -- route:list)
    args:
      cmd:
        usage: Comando artisan
    run: docker compose exec app php artisan ${cmd}

  bash:
    usage: Abre bash no container da aplicação
    run: docker compose exec app bash

  composer:
    usage: Roda um comando composer (ex. tusk composer -- require nome/pacote)
    args:
      cmd:
        usage: Comando composer
    run: docker compose exec app composer ${cmd}

  npm:
    usage: Roda um comando npm no container do vite (ex. tusk npm -- install pacote)
    args:
      cmd:
        usage: Comando npm
    run: docker compose exec vite npm ${cmd}

  ps:
    usage: Lista os containers e seus status
    run: docker compose ps

  npm-build:
    usage: Compila os assets frontend para produção
    run: docker run --rm -v ./laravel:/app -w /app node:22-alpine sh -c "npm install && npm run build"

  deploy:
    usage: Faz deploy da nova versão em produção (rodar no servidor)
    run: |
      git pull
      docker run --rm -v ./laravel:/app -w /app node:22-alpine sh -c "npm install && npm run build"
      docker compose -f docker-compose.prod.yml build app
      docker compose -f docker-compose.prod.yml up -d app
      docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
      docker compose -f docker-compose.prod.yml exec app php artisan storage:link
      docker compose -f docker-compose.prod.yml exec app php artisan config:cache
      docker compose -f docker-compose.prod.yml exec app php artisan route:cache
      docker compose -f docker-compose.prod.yml exec app php artisan view:cache
      docker compose -f docker-compose.prod.yml restart queue reverb nginx

  prod-logs:
    usage: Logs de produção de um serviço (app, nginx, reverb, queue, db)
    args:
      service:
        usage: Nome do serviço
    run: docker compose -f docker-compose.prod.yml logs -f ${service}

  prod-artisan:
    usage: Roda um comando artisan em produção (ex. tusk prod-artisan -- route:list)
    args:
      cmd:
        usage: Comando artisan
    run: docker compose -f docker-compose.prod.yml exec app php artisan ${cmd}

  pma:
    usage: Sobe o phpMyAdmin temporário (acesse em http://localhost:8081) — derruba com Ctrl+C
    run: |
      docker run --rm \
        --network pokehub_pokehub-network \
        --name pma_temp \
        -e PMA_HOST=db \
        -p 8081:80 \
        phpmyadmin/phpmyadmin
      docker stop pma_temp 2>/dev/null || true
