services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: pokehub
                uid: 1000
        container_name: pokehub_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./laravel:/var/www
        networks:
            - pokehub-network
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: pokehub_nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
            - ./laravel/public:/var/www/public
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - certbot-www:/var/www/certbot
        networks:
            - pokehub-network
        depends_on:
            - app

    reverb:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: pokehub
                uid: 1000
        container_name: pokehub_reverb
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./laravel:/var/www
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        networks:
            - pokehub-network
        depends_on:
            - app

    queue:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: pokehub
                uid: 1000
        container_name: pokehub_queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./laravel:/var/www
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        networks:
            - pokehub-network
        depends_on:
            - app
            - db

    db:
        image: mysql:8.0
        container_name: pokehub_db
        restart: unless-stopped
        env_file:
            - ./laravel/.env
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - pokehub-network

networks:
    pokehub-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
    certbot-www:
        driver: local
